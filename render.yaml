databases:
  - name: driveguard-db
    databaseName: driveguard
    user: driveguard
    plan: free

services:
  - type: web
    name: driveguard-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: driveguard-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3001

  - type: web
    name: driveguard-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://driveguard-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
